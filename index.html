<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Shot Report · AI Assistant</title>
<link rel="icon" href="icon.jpg" type="image/jpeg">
<link rel="apple-touch-icon" href="icon.jpg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f08a24">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shot Report">
<meta name="description" content="AI Assistant per l'analisi reparto macchina — primo assistente operatore">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#101113;--bg2:#17191c;--sf:#181a1d;--sf2:#23262b;
  --b:#2c3036;--b2:#3a414a;
  --tx:#e8e9ec;--tx2:#bcc0c7;--mu:#7b828d;--mu2:#565d66;
  --acc:#f08a24;
  --alta:#f08a24;--media:#b98a52;--bassa:#7b828d;
  /* alias compat con codice esistente */
  --red:#f08a24;--amb:#b98a52;--grn:#7b828d;
  --rdim:rgba(240,138,36,.11);--adim:rgba(185,138,82,.09);--gdim:rgba(123,130,141,.07);
  --mono:'IBM Plex Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  --disp:'Space Grotesk','Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.5;display:flex;flex-direction:column}
button{font-family:var(--sans);cursor:pointer}

/* Layout */
#topbar{flex:none;z-index:40;background:rgba(16,17,19,.93);backdrop-filter:blur(14px);border-bottom:1px solid var(--b);padding-top:env(safe-area-inset-top)}
#main{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain}
#bridge{flex:none}
.tbar-inner{max-width:860px;margin:0 auto;padding:16px 18px 12px}
.shell{max-width:860px;margin:0 auto;padding:0 18px 90px}
.brand{display:flex;align-items:center;gap:11px;margin-bottom:0}
.bmark{width:40px;height:40px;border-radius:8px;border:1px solid var(--b2);flex:none;object-fit:cover;display:block;background:transparent;padding:0;margin:0}
.btxt b{font-size:16px;font-weight:700;letter-spacing:.01em;display:block;line-height:1;font-family:var(--disp); margin-top:4px; margin-botton:0px}
.btxt small{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--mu);margin-top:0px}
.tabrow{display:flex;gap:2px;align-items:center;justify-content:center}
.tab{background:none;border:none;color:var(--mu);padding:8px 11px;font-family:var(--mono);font-size:12px;letter-spacing:.13em;text-transform:uppercase;position:relative;transition:color .12s}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--tx)}
.tab.on::after{content:'';position:absolute;left:14px;right:14px;bottom:3px;height:2px;background:var(--acc)}

/* Generics */
.sec{margin-top:26px}
.sectit{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
.sectit h2{font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-family:var(--disp)}
.sectit .n{font-family:var(--mono);font-size:11px;color:var(--mu2)}
.card{background:var(--sf);border:1px solid var(--b);border-radius:12px}
.lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--mu);display:block;margin-bottom:7px}
.field{margin-bottom:16px}
.inp{width:100%;background:var(--bg2);border:1px solid var(--b);border-radius:10px;color:var(--tx);font-family:var(--sans);font-size:14px;padding:11px 12px;resize:vertical;transition:border-color .12s}
.inp:focus{outline:none;border-color:var(--acc);background:#13151a}
.inp.mono{font-family:var(--mono);font-size:13px}
.hint{font-size:12px;color:var(--mu2);margin-top:6px;line-height:1.5}
.btn{background:var(--acc);color:#15110b;border:none;border-radius:10px;padding:12px 20px;font-size:13px;font-weight:650;letter-spacing:.02em;display:inline-flex;align-items:center;gap:8px;transition:filter .12s,opacity .12s}
.btn:hover{filter:brightness(1.08)}
.btn:disabled{opacity:.4;cursor:default;filter:none}
.btn.ghost{background:var(--sf2);color:var(--tx);border:1px solid var(--b)}
.btn.ghost:hover{border-color:var(--b2);filter:none}
.btn.sm{padding:8px 13px;font-size:12px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.spacer{flex:1}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex:none}

/* Criticità */
.pill{display:inline-flex;align-items:center;gap:8px;padding:6px 13px;border-radius:999px;font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;border:1px solid}
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:7px;font-family:var(--mono);font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;font-weight:600;border:1px solid}
.c-alta{color:var(--alta);border-color:rgba(240,138,36,.45);background:rgba(240,138,36,.11)}
.c-alta .dot{background:var(--alta)}
.c-media{color:var(--media);border-color:rgba(185,138,82,.4);background:rgba(185,138,82,.09)}
.c-media .dot{background:var(--media)}
.c-bassa{color:var(--bassa);border-color:#363b42;background:rgba(123,130,141,.07)}
.c-bassa .dot{background:var(--bassa)}

/* Dial — ghiera diaframmi (firma della scene card) */
.dial{position:relative;height:36px;background:var(--sf2);border-bottom:1px solid var(--b);overflow:hidden}
.dial svg{display:block;width:100%;height:100%}
.dial-needle{position:absolute;top:0;bottom:0;width:2px;left:4%;border-radius:2px;z-index:3;will-change:left;transition:left .9s cubic-bezier(.2,1,.32,1)}
.dial-needle::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);border-left:5px solid transparent;border-right:5px solid transparent;border-top:6px solid currentColor}
.scene-card[data-crit="alta"]  .dial-needle{color:var(--alta);background:var(--alta);box-shadow:0 0 10px rgba(240,138,36,.85)}
.scene-card[data-crit="media"] .dial-needle{color:var(--media);background:var(--media);box-shadow:0 0 6px rgba(185,138,82,.55)}
.scene-card[data-crit="bassa"] .dial-needle{color:var(--bassa);background:var(--bassa);box-shadow:none}

/* Scene card */
.scene-card{margin-top:14px;border:1px solid var(--b);border-radius:12px;overflow:hidden;background:var(--sf)}
.sch{padding:14px 17px 0;display:flex;justify-content:space-between;align-items:flex-start;gap:14px}
.sch .sc-id{font-family:var(--mono);font-size:11px;color:var(--mu2);letter-spacing:.1em;margin-bottom:4px}
.sch .sc-title{font-size:17px;font-weight:600;line-height:1.2;font-family:var(--disp);letter-spacing:-.01em}
.sch .sc-hdr{font-family:var(--mono);font-size:11px;color:var(--mu);margin-top:5px}
.synth{padding:10px 17px 4px;font-size:14px;color:var(--tx2);line-height:1.55}
.sgrid{padding:8px 17px 17px;display:grid;grid-template-columns:1fr 1fr;gap:18px}
.sgrid .full{grid-column:1/-1}
.scol h5{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mu);margin-bottom:9px}
.sli{display:flex;gap:9px;font-size:13.5px;line-height:1.48;color:var(--tx2);margin-bottom:7px}
.sli .d{flex:none;font-family:var(--mono);font-size:11px;padding-top:2px;color:var(--mu2)}

/* Block sections */
.bsec{padding:16px 20px;border-top:1px solid var(--b)}
.bsec h3{margin:0 0 12px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--mu);font-family:var(--mono);display:flex;align-items:center;gap:8px}
.bsec h3::before{content:'';display:inline-block;width:18px;height:2px;background:var(--b2);flex:none}
.bli{display:flex;gap:11px;font-size:14px;line-height:1.5;color:var(--tx2);margin-bottom:9px}
.bli .mk{flex:none;width:16px;font-family:var(--mono);font-size:12px;padding-top:2px}

/* Day card */
.dhead{padding:18px 20px;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
.dmeta{display:flex;gap:22px;flex-wrap:wrap}
.dmeta>div{display:flex;flex-direction:column;gap:3px}
.dmeta b{font-family:var(--mono);font-size:19px;font-weight:600}
.ov{padding:18px 20px;color:var(--tx2);font-size:14.5px;line-height:1.62;border-top:1px solid var(--b)}

/* Doc upload */
.doc-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 14px;background:var(--sf2);border:1px solid var(--b);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:var(--tx)}
.doc-fn{font-family:var(--mono);font-size:11px;color:var(--acc)}
.doc-fn{font-family:var(--mono);font-size:11px;color:var(--acc)}

/* Loading */
.spin{width:32px;height:32px;border:3px solid var(--b);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
.spin.sm{width:22px;height:22px;border-width:2px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Mem preview */
.mem-box{padding:18px}
.mem-box .mlbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--mu);margin-bottom:10px}
.mem-text{font-size:14px;line-height:1.6;color:var(--tx2);white-space:pre-wrap}

/* Collapsible sections */
.collapse-h{cursor:pointer;user-select:none;justify-content:space-between;align-items:center}
.collapse-h .n{margin-right:auto}
.collapse-arrow{font-size:30px;line-height:1;color:var(--mu2);transition:transform .18s ease;flex:none}
.collapse-arrow.open{transform:rotate(180deg)}

/* Riassunto sceneggiatura */
.riassunto-title{font-family:var(--disp);font-size:18px;font-weight:700;margin-bottom:10px;color:var(--tx)}
.riassunto-logline{font-size:14.5px;font-style:italic;color:var(--acc);line-height:1.5;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--b)}
.riassunto-sinossi p{font-size:14px;line-height:1.65;color:var(--tx2);margin-bottom:12px}
.riassunto-block{margin-top:18px;padding-top:16px;border-top:1px solid var(--b)}

/* Archive */
.arc-btn{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--sf);border:1px solid var(--b);border-radius:10px;text-align:left;width:100%;cursor:pointer;color:var(--tx);margin-bottom:8px;transition:border-color .12s,background .12s}
.arc-btn:hover{border-color:var(--b2);background:var(--sf2)}
.arc-info{flex:1;min-width:0}
.arc-info b{font-family:var(--disp);font-size:14px;font-weight:600;display:block}
.arc-info span{font-size:12.5px;color:var(--mu);display:block;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.arc-count{font-family:var(--mono);font-size:11px;color:var(--mu2);letter-spacing:.1em;flex:none}

/* Versioning */
.vbanner{margin:14px 0 0;padding:11px 15px;border:1px solid rgba(185,138,82,.4);background:rgba(185,138,82,.09);border-radius:10px;font-size:12.5px;color:#d9b97a;line-height:1.5}
.ver-item{display:flex;align-items:center;gap:13px;padding:13px 15px;border:1px solid var(--b);border-radius:9px;margin-bottom:8px;background:var(--sf)}
.ver-item.cur{border-color:rgba(240,138,36,.4);background:linear-gradient(rgba(240,138,36,.07),rgba(240,138,36,.07)),var(--sf)}
.ver-num{font-family:var(--mono);font-size:15px;font-weight:600;flex:none;width:34px;color:var(--acc)}
.ver-meta{flex:1;min-width:0}
.ver-meta .vd{font-family:var(--mono);font-size:12px;color:var(--tx)}
.ver-meta .vf{font-size:11.5px;color:var(--mu2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}
.ver-cur-badge{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--acc);border:1px solid rgba(240,138,36,.4);border-radius:4px;padding:3px 7px;flex:none}
.ver-acts{display:flex;gap:6px;flex:none}
.mini{background:var(--sf2);border:1px solid var(--b);color:var(--mu);border-radius:6px;padding:6px 9px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;cursor:pointer;transition:color .12s,border-color .12s}
.mini:hover{color:var(--tx);border-color:var(--b2)}
.mini.danger:hover{color:var(--alta);border-color:rgba(240,138,36,.4)}
.cmp{margin-top:12px;border:1px solid var(--b2);border-radius:12px;background:var(--bg2);overflow:hidden}
.cmp-head{padding:14px 17px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:1px solid var(--b);background:var(--sf)}
.cmp-head b{font-family:var(--mono);font-size:13px;font-weight:600}
.cmp-head small{font-size:11px;color:var(--mu2);display:block;margin-top:2px}
.cmp-body{padding:6px 17px 16px}
.cmp-grp{padding:13px 0;border-bottom:1px solid var(--b)}
.cmp-grp:last-child{border-bottom:none}
.cmp-grp h4{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mu);margin-bottom:10px}
.diff{display:flex;gap:9px;font-size:13px;line-height:1.5;margin-bottom:7px;align-items:flex-start}
.diff .s{flex:none;font-family:var(--mono);font-size:12px;font-weight:700;width:14px;padding-top:1px}
.diff.add .s{color:var(--tx2)} .diff.add{color:var(--tx2)}
.diff.rem .s{color:var(--alta);opacity:.6} .diff.rem{color:var(--mu)}
.diff.chg .s{color:var(--acc)} .diff.chg{color:#e8d0b0}
.diff .scn{font-family:var(--mono);font-size:11px;color:var(--mu2);flex:none}
.crit-arrow{font-family:var(--mono);font-size:11px;display:inline-flex;align-items:center;gap:6px;margin:2px 0}
.cmp-none{font-size:12.5px;color:var(--mu2);font-style:italic}
.diff-ai{margin-top:6px;padding:14px 17px;border-top:1px solid var(--b);background:var(--sf)}
.diff-ai .ai-txt{font-size:13.5px;line-height:1.6;color:var(--tx2);white-space:pre-wrap}

/* Mode switch */
.modebar{display:flex;align-items:center;gap:10px;padding:9px 0 13px;flex-wrap:wrap}
.modebar .ml{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--mu2)}
.mseg{display:inline-flex;background:var(--bg2);border:1px solid var(--b);border-radius:8px;padding:3px;gap:2px}
.mseg button{background:none;border:none;color:var(--mu);font-family:var(--mono);font-size:11px;letter-spacing:.04em;padding:6px 13px;border-radius:6px;display:inline-flex;align-items:center;gap:7px;transition:color .12s,background .12s}
.mseg button.on{background:var(--sf2);color:var(--tx)}
.mseg button.on.api{color:var(--acc)}
.mseg button.on.man{color:var(--tx2)}
.mode-note{font-size:11.5px;color:var(--mu2)}

/* Bridge overlay */
.bov{position:fixed;inset:0;z-index:80;background:rgba(6,7,10,.72);backdrop-filter:blur(4px);display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:30px 16px 60px}
.bx{width:100%;max-width:680px;background:var(--sf);border:1px solid var(--b2);border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,.5);overflow:hidden}
.bx-head{padding:17px 20px;border-bottom:1px solid var(--b);display:flex;align-items:flex-start;justify-content:space-between;gap:14px;background:linear-gradient(rgba(240,138,36,.06),transparent)}
.bx-head h3{font-size:15px;font-weight:650;letter-spacing:.01em;font-family:var(--disp)}
.bx-head .sub{font-size:12px;color:var(--mu);margin-top:3px;line-height:1.45}
.bx-x{background:var(--sf2);border:1px solid var(--b);color:var(--mu);border-radius:7px;padding:7px 11px;font-family:var(--mono);font-size:11px;cursor:pointer;flex:none}
.bx-x:hover{color:var(--tx);border-color:var(--b2)}
.bx-body{padding:18px 20px}
.bstep{margin-bottom:20px}
.bstep:last-child{margin-bottom:0}
.bstep-h{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.bnum{width:22px;height:22px;border-radius:50%;background:var(--sf2);border:1px solid var(--b2);color:var(--acc);font-family:var(--mono);font-size:11px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;flex:none}
.bstep-h b{font-size:13.5px;font-weight:600}
.bprompt{width:100%;background:var(--bg);border:1px solid var(--b);border-radius:9px;color:var(--mu);font-family:var(--mono);font-size:11.5px;line-height:1.5;padding:12px;height:120px;resize:vertical}
.bresp{width:100%;background:var(--bg2);border:1px solid var(--b);border-radius:9px;color:var(--tx);font-family:var(--mono);font-size:12.5px;line-height:1.5;padding:12px;height:140px;resize:vertical}
.bresp:focus{outline:none;border-color:var(--acc);background:#13151a}
.brow{display:flex;gap:9px;margin-top:10px;flex-wrap:wrap;align-items:center}
.blink{display:inline-flex;align-items:center;gap:7px;text-decoration:none;background:var(--sf2);border:1px solid var(--b);color:var(--tx);border-radius:8px;padding:9px 14px;font-size:12.5px;font-weight:600}
.blink:hover{border-color:var(--b2)}
.bstep.locked{opacity:.45;pointer-events:none;filter:grayscale(.3)}
.copied{font-family:var(--mono);font-size:11px;color:var(--acc);display:none;align-items:center;gap:6px}

/* Status inline */
.saved{font-family:var(--mono);font-size:11px;color:var(--acc);display:inline-flex;align-items:center;gap:7px}
.ok {color:var(--acc);font-family:var(--mono);font-size:10.5px}
.warn{color:var(--media);font-family:var(--mono);font-size:10.5px;display:block;margin-top:10px}
.err{margin-top:14px;padding:13px 16px;border:1px solid rgba(240,138,36,.35);background:rgba(240,138,36,.08);border-radius:10px;font-size:13.5px;color:#e8b887;line-height:1.5}
.ft{margin-top:28px;padding-top:18px;border-top:1px solid var(--b);font-size:11.5px;color:var(--mu2);line-height:1.6}

/* Print */
@media print{
  #topbar,.no-print{display:none!important}
  html,body{height:auto;overflow:visible}
  body{background:#fff;color:#000;display:block}
  #main{overflow:visible;height:auto}
  .shell{max-width:none;padding:0}
  .card,.scene-card{border:1px solid #ccc;break-inside:avoid;box-shadow:none}
  .dial{background:#f5f5f5;border-bottom:1px solid #ddd}
  .dial-needle{background:#c06000!important;box-shadow:none!important}
  .ov,.synth,.bli,.sli,.dmeta b{color:#000!important}
  .bsec h3,.scol h5,.lbl,.mlbl{color:#555!important}
  .mem-text{color:#000!important}
  .riassunto-sinossi p,.riassunto-logline{color:#000!important;border-color:#ccc!important}
  .print-head{display:block!important;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #000;font-size:18px;font-weight:700;color:#000;font-family:'Space Grotesk',sans-serif}
  .c-alta{color:#c06000!important;background:#fde8d0!important}
  .c-media{color:#7a5500!important;background:#f5e8cc!important}
  .c-bassa{color:#4a5060!important;background:#e8eaed!important}
}
.print-head{display:none}
@media(max-width:560px){.sgrid{grid-template-columns:1fr}.dmeta{gap:16px}}
@media(max-width:768px){.inp,.bprompt,.bresp{font-size:16px}}

/* Auth gate */
#authgate{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px}
.ag-box{width:100%;max-width:380px}
.ag-logo{width:52px;height:52px;border-radius:11px;border:1px solid var(--b2);display:block;margin:0 auto 18px;object-fit:cover}
.ag-title{font-family:var(--disp);font-size:19px;font-weight:700;text-align:center;margin-bottom:4px}
.ag-sub{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--mu);text-align:center;margin-bottom:26px}
.ag-tabs{display:flex;gap:2px;margin-bottom:18px;background:var(--sf2);border-radius:10px;padding:3px}
.ag-tab{flex:1;background:none;border:none;color:var(--mu);padding:9px 0;font-size:12.5px;font-weight:600;border-radius:8px;transition:background .12s,color .12s}

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
let sb=null; // client Supabase, inizializzato più sotto — dichiarato qui per evitare riferimenti prematuri

// ═══════════════════════════ STATE ════════════════════════════════════
function today(){ return new Date().toISOString().slice(0,10); }

function loadTodayDay(){
  const t=today();
  const saved=lsGet('ac.day.'+t,null);
  return saved||{data:t,odg:'',scene:''};
}

const PRICING={inputCost:0.000003,outputCost:0.000015};

const S={
  view:'oggi',
  apiKey: localStorage.getItem('ac.key')||'',
  profile: lsGet('ac.profile',{nome:'',gear:'',note:'',type:'film'}),
  docs:    lsGet('ac.docs',   {sceneggiatura:null,spoglio:null,pdl:null,listamateriale:null,sceneggiature:[]}),
  memVersions: lsGet('ac.memVersions',[]),
  memCurrentId: lsGet('ac.memCurrentId',null),
  memoria: null,            // puntatore alla versione corrente (impostato sotto)
  index:   lsGet('ac.index',  []),
  day:     loadTodayDay(),
  analysis: null,
  loading:false, step:'', sub:'', error:'',
  memLoading:false, memStep:'', memError:'',
  compare:null,             // {aId,bId}
  diffAI:{loading:false,text:'',error:''},
  mode: localStorage.getItem('ac.mode')||'manual',  // 'api' | 'manual'
  bridge:null,              // ponte copia-incolla manuale verso claude.ai
  usage: lsGet('ac.usage',{session:{inputTokens:0,outputTokens:0,cost:0},daily:{}}),  // track token usage
  user: null,                // utente autenticato (sync cloud)
  syncStatus:'idle', syncError:'', lastSyncAt:null,
  riassunto: lsGet('ac.riassunto',null),

// Migrazione dal vecchio formato a versione singola → archivio versioni
(function initMem(){
  const legacy=lsGet('ac.memoria',null);
  if(legacy && !S.memVersions.length){
    const v={id:'v'+(legacy.ts||Date.now()),v:1,ts:legacy.ts||Date.now(),docNames:{},
      briefing:legacy.briefing||'',scene_chiave:legacy.scene_chiave||[],
      pdl_summary:legacy.pdl_summary||'',rischi:legacy.rischi||[]};
    S.memVersions=[v];S.memCurrentId=v.id;
    lsSet('ac.memVersions',S.memVersions);lsSet('ac.memCurrentId',S.memCurrentId);
  }
  S.memoria=S.memVersions.find(v=>v.id===S.memCurrentId)||S.memVersions[0]||null;
  if(S.memoria)S.memCurrentId=S.memoria.id;
})();

// Migrazione docs: aggiungi listamateriale se manca
if(!S.docs.listamateriale){S.docs.listamateriale=null;lsSet('ac.docs',S.docs);}

// ═══════════════════════════ STORAGE ══════════════════════════════════
function lsGet(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch{return def;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{} notifyChange();}
function saveDayState(){lsSet('ac.day.'+S.day.data,S.day);}

// ═══════════════════════════ CLOUD SYNC (Supabase) ═════════════════════
const SUPABASE_URL='https://suxyvzhskdnxaquxcmsb.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_51_XykRvGwexvVk3Y3JOIQ_XSriej4e';
try{
  if(SUPABASE_URL.startsWith('https://')&&!SUPABASE_URL.includes('YOUR_PROJECT')&&window.supabase){
    sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
    sb.auth.onAuthStateChange((event)=>{
      if(event==='PASSWORD_RECOVERY')renderAuthGate('recovery');
    });
  }
}catch(e){console.error('Supabase init falito, modalità locale:',e);}

let pushTimer=null;
function notifyChange(){
  if(!sb||!S.user)return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(pushToCloud,600);
}
function flushPush(){
  if(!sb||!S.user||!pushTimer)return;
  clearTimeout(pushTimer);
  pushTimer=null;
  pushToCloud();
}
function collectLocalData(){
  const data={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('ac.'))data[k]=localStorage.getItem(k);
  }
  return data;
}
async function pushToCloud(){
  if(!sb||!S.user)return;
  S.syncStatus='syncing';
  const data=collectLocalData();
  const{error}=await sb.from('app_data').upsert({user_id:S.user.id,data,updated_at:new Date().toISOString()});
  if(error){S.syncStatus='error';S.syncError=error.message;console.error('Push cloud fallito:',error);}
  else{S.syncStatus='synced';S.lastSyncAt=new Date();}
}
async function pullFromCloud(){
  if(!sb||!S.user)return;
  const{data:row,error}=await sb.from('app_data').select('data').eq('user_id',S.user.id).maybeSingle();
  if(error){S.syncStatus='error';S.syncError=error.message;console.error('Pull cloud fallito:',error);return;}
  if(row&&row.data){
    Object.entries(row.data).forEach(([k,v])=>{try{localStorage.setItem(k,v);}catch{}});
  }
  reloadStateFromStorage();
  S.syncStatus='synced';S.lastSyncAt=new Date();
}
document.addEventListener('visibilitychange',()=>{
  if(!sb||!S.user)return;
  if(document.visibilityState==='hidden'){
    flushPush();
  }else if(document.visibilityState==='visible'){
    pullFromCloud().then(render);
  }
});
window.addEventListener('pagehide',flushPush);
function reloadStateFromStorage(){
  S.apiKey=localStorage.getItem('ac.key')||'';
  S.profile=lsGet('ac.profile',{nome:'',gear:'',note:'',type:'film'});
  S.docs=lsGet('ac.docs',{sceneggiatura:null,spoglio:null,pdl:null,listamateriale:null,sceneggiature:[]});
  S.memVersions=lsGet('ac.memVersions',[]);
  S.memCurrentId=lsGet('ac.memCurrentId',null);
  S.memoria=S.memVersions.find(v=>v.id===S.memCurrentId)||S.memVersions[0]||null;
  if(S.memoria)S.memCurrentId=S.memoria.id;
  S.index=lsGet('ac.index',[]);
  S.day=loadTodayDay();
  S.mode=localStorage.getItem('ac.mode')||'manual';
  S.usage=lsGet('ac.usage',{session:{inputTokens:0,outputTokens:0,cost:0},daily:{}});
  S.riassunto=lsGet('ac.riassunto',null);
  S.collapse=lsGet('ac.collapse',{attrezzatura:true,briefing:true,riassunto:true,cronologia:true});
}

function renderAuthGate(view,err,info){
  view=view||'login';
  const el=document.getElementById('authgate');
  if(!sb){el.style.display='none';return;}
  el.style.display='flex';

  if(view==='recovery'){
    el.innerHTML=`<div class="ag-box">
      <img class="ag-logo" src="icon.jpg" alt="">
      <div class="ag-title">Shot Report</div>
      <div class="ag-sub">Imposta una nuova password</div>
      <div class="field"><label class="lbl">Nuova password</label><input id="ag-pass" class="inp" type="password" placeholder="••••••••"></div>
      <div class="field"><label class="lbl">Conferma password</label><input id="ag-pass2" class="inp" type="password" placeholder="••••••••"></div>
      ${err?`<div class="err">${esc(err)}</div>`:''}
      <button id="ag-submit" class="btn" style="width:100%;justify-content:center;margin-top:6px">Salva nuova password</button>
    </div>`;
    el.querySelector('#ag-submit').addEventListener('click',async()=>{
      const p1=document.getElementById('ag-pass').value;
      const p2=document.getElementById('ag-pass2').value;
      if(!p1||p1.length<6){renderAuthGate('recovery','La password deve avere almeno 6 caratteri.');return;}
      if(p1!==p2){renderAuthGate('recovery','Le due password non coincidono.');return;}
      const btn=document.getElementById('ag-submit');btn.disabled=true;btn.textContent='Attendere…';
      const{error}=await sb.auth.updateUser({password:p1});
      if(error){renderAuthGate('recovery',error.message);return;}
      const{data:{session}}=await sb.auth.getSession();
      S.user=session?.user||null;
      await pullFromCloud();
      document.getElementById('authgate').style.display='none';
      render();
    });
    return;
  }

  if(view==='reset'){
    el.innerHTML=`<div class="ag-box">
      <img class="ag-logo" src="icon.jpg" alt="">
      <div class="ag-title">Shot Report</div>
      <div class="ag-sub">Recupera la password</div>
      <div class="field"><label class="lbl">Email</label><input id="ag-email" class="inp" type="email" placeholder="tu@esempio.com"></div>
      ${err?`<div class="err">${esc(err)}</div>`:''}
      ${info?`<div class="err" style="border-color:rgba(240,138,36,.5);background:rgba(240,138,36,.12)">${esc(info)}</div>`:''}
      <button id="ag-submit" class="btn" style="width:100%;justify-content:center;margin-top:6px">Invia link di recupero</button>
      <button id="ag-back" class="ag-link">← Torna al login</button>
    </div>`;
    el.querySelector('#ag-back').addEventListener('click',()=>renderAuthGate('login'));
    el.querySelector('#ag-submit').addEventListener('click',async()=>{
      const email=document.getElementById('ag-email').value.trim();
      if(!email){renderAuthGate('reset','Inserisci la tua email.');return;}
      const btn=document.getElementById('ag-submit');btn.disabled=true;btn.textContent='Attendere…';
      const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:location.origin+location.pathname});
      if(error){renderAuthGate('reset',error.message);return;}
      renderAuthGate('reset',null,'Controlla la tua email: ti abbiamo inviato un link per reimpostare la password.');
    });
    return;
  }

  el.innerHTML=`<div class="ag-box">
    <img class="ag-logo" src="icon.jpg" alt="">
    <div class="ag-title">Shot Report</div>
    <div class="ag-sub">Accedi per sincronizzare i tuoi dati</div>
    <div class="ag-tabs">
      <button class="ag-tab ${view==='login'?'on':''}" data-v="login">Accedi</button>
      <button class="ag-tab ${view==='signup'?'on':''}" data-v="signup">Registrati</button>
    </div>
    <div class="field"><label class="lbl">Email</label><input id="ag-email" class="inp" type="email" placeholder="tu@esempio.com"></div>
    <div class="field"><label class="lbl">Password</label><input id="ag-pass" class="inp" type="password" placeholder="••••••••"></div>
    ${err?`<div class="err">${esc(err)}</div>`:''}
    <button id="ag-submit" class="btn" style="width:100%;justify-content:center;margin-top:6px">${view==='login'?'Accedi':'Crea account'}</button>
    ${view==='login'?`<button id="ag-forgot" class="ag-link">Password dimenticata?</button>`:''}
  </div>`;
  el.querySelectorAll('.ag-tab').forEach(b=>b.addEventListener('click',()=>renderAuthGate(b.dataset.v)));
  el.querySelector('#ag-forgot')?.addEventListener('click',()=>renderAuthGate('reset'));
  el.querySelector('#ag-submit').addEventListener('click',async()=>{
    const email=document.getElementById('ag-email').value.trim();
    const password=document.getElementById('ag-pass').value;
    if(!email||!password){renderAuthGate(view,'Inserisci email e password.');return;}
    const btn=document.getElementById('ag-submit');btn.disabled=true;btn.textContent='Attendere…';
    const fn=view==='login'?sb.auth.signInWithPassword({email,password}):sb.auth.signUp({email,password});

    if(error){renderAuthGate(view,error.message);return;}
    if(view==='signup'&&!data.session){renderAuthGate('login','Account creato. Controlla l\'email per confermare, poi accedi.');return;}
    S.user=data.session?.user||data.user;
    await pullFromCloud();
    document.getElementById('authgate').style.display='none';
    render();
  });
}
function renderAuthLoading(){
  const el=document.getElementById('authgate');
  el.style.display='flex';
  el.innerHTML=`<div class="ag-box" style="text-align:center"><div class="ag-spin"></div></div>`;
}
async function logout(){
  if(!sb)return;
  await sb.auth.signOut();
  S.user=null;
  location.reload();
}
async function initAuth(){
  if(!sb){document.getElementById('authgate').style.display='none';return;}
  renderAuthLoading();
  const isRecovery=new URLSearchParams(location.hash.slice(1)).get('type')==='recovery';
  const{data:{session}}=await sb.auth.getSession();
  if(isRecovery&&session){
    history.replaceState(null,'',location.pathname+location.search);
    renderAuthGate('recovery');
    return;
  }
  if(session){
    S.user=session.user;
    await pullFromCloud();
    document.getElementById('authgate').style.display='none';
    render();
  }else{
    renderAuthGate('login');
  }
}

function trackUsage(inputTokens,outputTokens){
  const cost=inputTokens*PRICING.inputCost+outputTokens*PRICING.outputCost;
  S.usage.session.inputTokens+=inputTokens;
  S.usage.session.outputTokens+=outputTokens;
  S.usage.session.cost+=cost;
  const d=today();
  if(!S.usage.daily[d])S.usage.daily[d]={tokens:0,cost:0};
  S.usage.daily[d].tokens+=inputTokens+outputTokens;
  S.usage.daily[d].cost+=cost;
  lsSet('ac.usage',S.usage);
}

function formatCost(euros){
  if(euros<0.01)return '<0.01 €';
  return '€'+euros.toFixed(2);
}

// ═══════════════════════════ PDF ══════════════════════════════════════
async function extractText(file){
  const ab=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:new Uint8Array(ab)}).promise;
  let t='';
  for(let i=1;i<=pdf.numPages;i++){
    const pg=await pdf.getPage(i);
    const ct=await pg.getTextContent();
    t+=ct.items.map(s=>s.str).join(' ')+'\n';
  }
  return t.slice(0,80000);
}

// ═══════════════════════════ API ══════════════════════════════════════
async function claude(sys,usr,maxT=2000){
  if(!S.apiKey) throw new Error('API key non impostata — vai in Produzione → Impostazioni.');
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':S.apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:maxT,
      system:sys,
      messages:[{role:'user',content:usr}]
    })
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||'Errore HTTP '+r.status);}
  const d=await r.json();
  if(d.usage){trackUsage(d.usage.input_tokens||0,d.usage.output_tokens||0);}
  return d.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');
}

function parseJSON(t){
  t=t.replace(/```json\n?/gi,'').replace(/```\n?/g,'').trim();
  const a=t.indexOf('{'),b=t.lastIndexOf('}');
  if(a!==-1&&b!==-1)t=t.slice(a,b+1);
  return JSON.parse(t);
}

// ═══════════════════════════ UTILS ════════════════════════════════════
const NORM=c=>{const v=(c||'').toLowerCase();return v.startsWith('a')?'alta':v.startsWith('m')?'media':'bassa';};
const RANK={alta:3,media:2,bassa:1};
const LABEL={alta:'Alta',media:'Media',bassa:'Bassa'};
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(iso){
  try{const d=new Date(iso+'T00:00:00');return String(d.getDate()).padStart(2,'0')+'-'+String(d.getMonth()+1)+'-'+d.getFullYear();}
  catch{return iso;}
}
function splitScenes(text){
  if(!text.trim())return[];
  const lines=text.split(/\r?\n/);
  const H=/^\s*(\d+[.)]\s*)?(INT|EST|INT\s*[\/.\-]\s*EST|EST\s*[\/.\-]\s*INT|INTERNO|ESTERNO)\b/i;
  const A=/^\s*SCENA\s+\d+/i;
  const blks=[];let cur=null;
  for(const ln of lines){
    if(H.test(ln)||A.test(ln)){if(cur)blks.push(cur);cur={hdr:ln.trim(),txt:ln+'\n'};}
    else if(cur){cur.txt+=ln+'\n';}
    else{cur={hdr:'Sequenza',txt:ln+'\n'};}
  }
  if(cur)blks.push(cur);
  if(!blks.length)blks.push({hdr:'Sequenza',txt:text});
  return blks.filter(b=>b.txt.trim().length>3).map((b,i)=>({id:i+1,hdr:b.hdr.slice(0,90),txt:b.txt.trim()}));
}

// ═══════════════════════════ CONTEXT BUILDERS ═════════════════════════
function memCtx(){
  const m=S.memoria;if(!m)return'';
  let c='\n\n━━ MEMORIA PRODUZIONE (usa per arricchire l\'analisi) ━━\n';
  if(m.briefing)c+='BRIEFING REPARTO MACCHINA:\n'+m.briefing+'\n';
  if(m.pdl_summary)c+='\nPIANO DI LAVORAZIONE:\n'+m.pdl_summary+'\n';
  if(m.scene_chiave?.length){
    c+='\nSCENE CHIAVE (da spoglio/sceneggiatura):\n';
    c+=m.scene_chiave.map(s=>`• Sc.${s.sc} [${LABEL[NORM(s.crit)]}] ${s.desc} — ${s.nota}`).join('\n');
  }
  if(m.rischi?.length)c+='\n\nRISCHI TECNICI PRODUZIONE:\n'+m.rischi.map(r=>'• '+r).join('\n');
  return c+'\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
}
function histCtx(){
  if(!S.index.length)return'';
  const rec=S.index.slice(0,6).map(d=>`${fmtDate(d.data)} [${LABEL[d.crit]}] ${d.scene_count} sc. ${d.titoli||''}`);
  return'\n\nGIORNATE GIÀ LAVORATE (per correlazioni):\n'+rec.join('\n')+'\n';
}
function prodCtx(){
  let c='';
  if(S.profile.nome)c+=`PRODUZIONE: ${S.profile.nome}\n`;
  if(S.profile.gear)c+=`\nMEZZI / ATTREZZATURA:\n${S.profile.gear}\n`;
  if(S.profile.note)c+=`\nNOTE PRODUZIONE:\n${S.profile.note}\n`;
  return c;
}

// ═══════════════════════════ BUSINESS LOGIC ═══════════════════════════
function buildDocsMsg(){
  let msg=prodCtx()+'\n\n';
  if(S.profile.type==='film'){
    if(S.docs.sceneggiatura)msg+='=== SCENEGGIATURA ===\n'+S.docs.sceneggiatura.testo+'\n\n';
  }else{
    if(S.docs.sceneggiature?.length){
      S.docs.sceneggiature.forEach((s,i)=>{
        msg+=`=== SCENEGGIATURA ${i+1} (${s.nome}) ===\n${s.testo}\n\n`;
      });
    }
  }
  if(S.docs.spoglio)msg+='=== SPOGLIO ===\n'+S.docs.spoglio.testo+'\n\n';
  if(S.docs.pdl)msg+='=== PIANO DI LAVORAZIONE ===\n'+S.docs.pdl.testo+'\n\n';
  msg+='Crea il briefing di produzione per il reparto macchina.';
  return msg;
}
function applyDocsResult(j){
  const ts=Date.now();
  const vnum=S.memVersions.reduce((m,v)=>Math.max(m,v.v||0),0)+1;
  const docNames={
    spoglio:S.docs.spoglio?.nome||null,
    pdl:S.docs.pdl?.nome||null
  };
  if(S.profile.type==='film'){
    docNames.sceneggiatura=S.docs.sceneggiatura?.nome||null;
  }else{
    docNames.sceneggiature=(S.docs.sceneggiature||[]).map(s=>s.nome);
  }
  const ver={
    id:'v'+ts, v:vnum, ts,
    docNames,
    briefing:j.briefing||'',
    scene_chiave:Array.isArray(j.scene_chiave)?j.scene_chiave:[],
    pdl_summary:j.pdl_summary||'',
    rischi:Array.isArray(j.rischi)?j.rischi:[]
  };
  S.memVersions=[ver,...S.memVersions];
  S.memCurrentId=ver.id;S.memoria=ver;
  lsSet('ac.memVersions',S.memVersions);
  lsSet('ac.memCurrentId',S.memCurrentId);
  lsSet('ac.memoria',ver);
  S.compare=null;
}
async function runDocs(){
  const hasSceneggiatura=S.profile.type==='film'?S.docs.sceneggiatura:(S.docs.sceneggiature?.length>0);
  if(!hasSceneggiatura&&!S.docs.spoglio&&!S.docs.pdl){S.memError='Carica almeno un documento prima di analizzare.';render();return;}
  const msg=buildDocsMsg();
  if(S.mode==='manual'){openBridge('docs',SYS_DOCS,msg);return;}
  S.memLoading=true;S.memError='';S.memStep='Analisi documenti in corso…';render();
  try{
    const raw=await claude(SYS_DOCS,msg,3000);
    applyDocsResult(parseJSON(raw));S.memStep='';
  }catch(e){S.memError='Analisi non riuscita: '+(e.message||'errore sconosciuto');}
  finally{S.memLoading=false;render();}
}

function hasSceneggiaturaLoaded(){
  return S.profile.type==='film'?!!S.docs.sceneggiatura:(S.docs.sceneggiature?.length>0);
}
function buildRiassuntoMsg(){
  let msg='';
  if(S.profile.type==='film'){
    if(S.docs.sceneggiatura)msg+='=== SCENEGGIATURA ===\n'+S.docs.sceneggiatura.testo+'\n\n';
  }else{
    (S.docs.sceneggiature||[]).forEach((s,i)=>{msg+=`=== SCENEGGIATURA ${i+1} (${s.nome}) ===\n${s.testo}\n\n`;});
  }
  msg+='Crea il riassunto della sceneggiatura.';
  return msg;
}
function applyRiassuntoResult(j){
  S.riassunto={
    titolo:j.titolo||'',
    logline:j.logline||'',
    sinossi:j.sinossi||'',
    personaggi:Array.isArray(j.personaggi)?j.personaggi:[],
    struttura:Array.isArray(j.struttura)?j.struttura:[],
    ts:Date.now()
  };
  lsSet('ac.riassunto',S.riassunto);
}
async function runRiassunto(){
  if(!hasSceneggiaturaLoaded()){S.riassuntoError='Carica la sceneggiatura prima di generare il riassunto.';render();return;}
  const msg=buildRiassuntoMsg();

  S.riassuntoLoading=true;S.riassuntoError='';render();
  try{
    const raw=await claude(SYS_RIASSUNTO,msg,3500);
    applyRiassuntoResult(parseJSON(raw));
  }catch(e){S.riassuntoError='Generazione non riuscita: '+(e.message||'errore sconosciuto');}
  finally{S.riassuntoLoading=false;render();}
}

function finalizeDay(res,dout){
  const scMax=res.reduce((m,r)=>Math.max(m,RANK[r.criticita]),1);
  const critG=Object.keys(RANK).find(k=>RANK[k]===Math.max(RANK[dout.criticita_globale]||1,scMax))||'media';
  S.analysis={data:S.day.data,odg:S.day.odg,nome:S.profile.nome,crit:critG,overview:dout.overview,checklist:dout.checklist,anticipa:dout.anticipa,domande:dout.domande,scenes:res,memVersionId:S.memCurrentId,memV:S.memoria?.v||null,ts:Date.now()};
}
function applyDayResult(j,scenes){
  const arr=Array.isArray(j.scene)?j.scene:[];
  const res=scenes.map((sc,i)=>{
    const x=arr[i]||{};
    return{id:sc.id,hdr:sc.hdr,criticita:NORM(x.criticita),titolo:x.titolo_breve||sc.hdr,sintesi:x.sintesi||'',gear:Array.isArray(x.gear)?x.gear:[],anticipa:Array.isArray(x.anticipa)?x.anticipa:[],note:Array.isArray(x.note_tecniche)?x.note_tecniche:[],failed:!arr[i]};
  });
  const q=j.quadro||{};
  finalizeDay(res,{overview:q.overview||'',criticita_globale:NORM(q.criticita_globale),checklist:Array.isArray(q.checklist)?q.checklist:[],anticipa:Array.isArray(q.anticipa)?q.anticipa:[],domande:Array.isArray(q.domande)?q.domande:[]});
}
async function runDay(){
  S.error='';S.analysis=null;
  const scenes=splitScenes(S.day.scene);
  if(!scenes.length){S.error='Incolla almeno una scena nel campo sceneggiatura.';render();return;}
  const base=prodCtx()+memCtx()+histCtx();

  if(S.mode==='manual'){
    const msg=base+`\n\nODG / NOTE DEL GIORNO:\n${S.day.odg||'(non fornito)'}\n\nSCENE DELLA GIORNATA (${scenes.length}) — analizzale tutte, una entry per scena nello stesso ordine:\n`+
      scenes.map((s,i)=>`\n───── SCENA ${i+1} (rif: ${s.hdr}) ─────\n${s.txt}`).join('\n');
    openBridge('day',SYS_DAY_ALL,msg,{scenes});
    return;
  }

  S.loading=true;S.step=`Rilevate ${scenes.length} ${scenes.length===1?'scena':'scene'} — analisi reparto macchina`;S.sub='';render();
  try{
    const res=[];
    for(let i=0;i<scenes.length;i++){
      S.sub=`Scena ${i+1} di ${scenes.length}`;render();
      const sc=scenes[i];
      const msg=base+`\n\nODG / NOTE DEL GIORNO:\n${S.day.odg||'(non fornito)'}\n\nSCENA DA ANALIZZARE:\n${sc.txt}`;
      try{
        const raw=await claude(SYS_SCENE,msg,1500);
        const j=parseJSON(raw);
        res.push({id:sc.id,hdr:sc.hdr,criticita:NORM(j.criticita),titolo:j.titolo_breve||sc.hdr,sintesi:j.sintesi||'',gear:Array.isArray(j.gear)?j.gear:[],anticipa:Array.isArray(j.anticipa)?j.anticipa:[],note:Array.isArray(j.note_tecniche)?j.note_tecniche:[]});
      }catch{
        res.push({id:sc.id,hdr:sc.hdr,criticita:'media',titolo:sc.hdr,sintesi:'Analisi non riuscita per questa scena — riprova.',gear:[],anticipa:[],note:[],failed:true});
      }
    }
    S.step='Quadro della giornata';S.sub='';render();
    const dayMsg=base+`\n\nODG:\n${S.day.odg||'(non fornito)'}\n\nSCENE DELLA GIORNATA (già analizzate):\n`+res.map(r=>`• [${LABEL[r.criticita]}] ${r.titolo} — ${r.sintesi}`).join('\n');
    let dout={overview:'',criticita_globale:'media',checklist:[],anticipa:[],domande:[]};
    try{const raw=await claude(SYS_DAY,dayMsg,2000);const j=parseJSON(raw);dout={overview:j.overview||'',criticita_globale:NORM(j.criticita_globale),checklist:Array.isArray(j.checklist)?j.checklist:[],anticipa:Array.isArray(j.anticipa)?j.anticipa:[],domande:Array.isArray(j.domande)?j.domande:[]};}catch{}
    finalizeDay(res,dout);
  }catch(e){S.error=e.message||"Errore durante l'analisi.";}
  finally{S.loading=false;S.step='';S.sub='';render();}
}

function saveDay(){

// ═══════════════════════════ VERSIONING ═══════════════════════════════
function setCurrentVersion(id){
  const v=S.memVersions.find(x=>x.id===id);if(!v)return;
  S.memCurrentId=id;S.memoria=v;
  lsSet('ac.memCurrentId',id);lsSet('ac.memoria',v);
  render();
}
function deleteVersion(id){
  if(!confirm('Eliminare questa versione della memoria?\nLe giornate già salvate restano intatte, ma non potrai più confrontarla né tornarci.'))return;
  S.memVersions=S.memVersions.filter(v=>v.id!==id);
  if(S.memCurrentId===id){
    S.memoria=S.memVersions[0]||null;
    S.memCurrentId=S.memoria?S.memoria.id:null;
    lsSet('ac.memCurrentId',S.memCurrentId);
    if(S.memoria)lsSet('ac.memoria',S.memoria); else localStorage.removeItem('ac.memoria');
  }
  if(S.compare&&(S.compare.aId===id||S.compare.bId===id))S.compare=null;
  lsSet('ac.memVersions',S.memVersions);
  render();
}
function openCompare(bId){
  const i=S.memVersions.findIndex(v=>v.id===bId);
  const older=S.memVersions[i+1];
  if(!older){alert('Nessuna versione precedente con cui confrontare.');return;}
  S.compare={aId:older.id,bId};
  S.diffAI={loading:false,text:'',error:''};
  render();
}
function diffVersions(o,n){
  const k=s=>String(s.sc).trim();
  const oM={},nM={};
  (o.scene_chiave||[]).forEach(s=>oM[k(s)]=s);
  (n.scene_chiave||[]).forEach(s=>nM[k(s)]=s);
  const added=[],removed=[],changed=[];
  Object.keys(nM).forEach(key=>{
    if(!oM[key])added.push(nM[key]);
    else{const a=oM[key],b=nM[key];
      if(NORM(a.crit)!==NORM(b.crit)||a.nota!==b.nota||a.desc!==b.desc)changed.push({sc:key,from:a,to:b});}
  });
  Object.keys(oM).forEach(key=>{if(!nM[key])removed.push(oM[key]);});
  const oR=new Set(o.rischi||[]),nR=new Set(n.rischi||[]);
  return{added,removed,changed,
    rAdd:[...nR].filter(x=>!oR.has(x)),
    rRem:[...oR].filter(x=>!nR.has(x)),
    briefingChanged:(o.briefing||'')!==(n.briefing||''),
    pdlChanged:(o.pdl_summary||'')!==(n.pdl_summary||'')};
}
function buildDiffMsg(){
  const a=S.memVersions.find(v=>v.id===S.compare.aId);
  const b=S.memVersions.find(v=>v.id===S.compare.bId);
  if(!a||!b)return null;
  const dump=m=>`BRIEFING:\n${m.briefing}\n\nPIANO DI LAVORAZIONE:\n${m.pdl_summary}\n\nSCENE CHIAVE:\n${(m.scene_chiave||[]).map(s=>`Sc.${s.sc} [${s.crit}] ${s.desc} — ${s.nota}`).join('\n')}\n\nRISCHI:\n${(m.rischi||[]).join('; ')}`;
  return`═══ VERSIONE PRECEDENTE (v${a.v}) ═══\n${dump(a)}\n\n\n═══ VERSIONE NUOVA (v${b.v}) ═══\n${dump(b)}`;
}
async function runDiff(){
  if(!S.compare)return;
  const msg=buildDiffMsg();if(!msg)return;
  if(S.mode==='manual'){openBridge('diff',SYS_DIFF,msg);return;}
  S.diffAI={loading:true,text:'',error:''};render();
  try{const raw=await claude(SYS_DIFF,msg,1200);S.diffAI={loading:false,text:raw.trim(),error:''};}
  catch(e){S.diffAI={loading:false,text:'',error:e.message||'Errore'};}
  render();
}

// ═══════════════════════════ PONTE MANUALE ════════════════════════════
function openBridge(kind,sys,msg,extra){
  S.bridge={kind,sys,msg,prompt:sys+'\n\n'+'━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n'+msg,response:'',error:'',extra:extra||null};
  render();
}
function closeBridge(){S.bridge=null;render();}
function setMode(m){
  S.mode=m;localStorage.setItem('ac.mode',m);notifyChange();
  if(m==='api')S.bridge=null;
  render();
}
function toggleCollapse(key){
  S.collapse[key]=!S.collapse[key];
  lsSet('ac.collapse',S.collapse);
  render();
}
function processBridge(){
  if(!S.bridge)return;
  const ta=document.getElementById('bridge-resp');
  const text=(ta?ta.value:S.bridge.response||'').trim();
  if(!text){S.bridge.error='Incolla prima la risposta di Claude qui sotto.';render();return;}
  S.bridge.response=text;S.bridge.error='';
  const kind=S.bridge.kind;
  try{
    if(kind==='diff'){
      S.diffAI={loading:false,text:text.replace(/```[a-z]*\n?/gi,'').trim(),error:''};
      closeBridge();return;
    }
    const j=parseJSON(text);
    if(kind==='docs')applyDocsResult(j);
    else if(kind==='day')applyDayResult(j,S.bridge.extra.scenes);
    else if(kind==='riassunto')applyRiassuntoResult(j);
    closeBridge();
  }catch(e){
    S.bridge.error='Non riesco a leggere la risposta. Assicurati di aver incollato il blocco COMPLETO che inizia con { e finisce con } (senza testo aggiunto). Dettaglio: '+(e.message||'formato non valido');
    render();
  }
}
function copyPrompt(){
  const t=S.bridge.prompt;
  const done=()=>{const el=document.getElementById('bridge-copied');if(el){el.style.display='inline-flex';setTimeout(()=>{el.style.display='none';},2000);}};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(done).catch(()=>{fallbackCopy();done();});
  }else{fallbackCopy();done();}
}
function fallbackCopy(){
  const ta=document.getElementById('bridge-prompt');if(!ta)return;
  ta.removeAttribute('readonly');ta.select();
  try{document.execCommand('copy');}catch{}
  ta.setAttribute('readonly','true');window.getSelection()?.removeAllRanges();
}
function renderBridge(){

  const meta={

  el.innerHTML=`<div class="bov">

// ═══════════════════════════ UI HELPERS ═══════════════════════════════
function pill(c){return`<span class="pill c-${c}"><span class="dot"></span>${LABEL[c]}</span>`;}
function badge(c){return`<span class="badge c-${c}"><span class="dot"></span>${LABEL[c]}</span>`;}

const DIALTICKS=(()=>{
  const labels=['11','8','5.6','4','2.8','2','1.4'];
  let s='';
  for(let i=0;i<=30;i++){
    const x=(8+i*6.133).toFixed(2),major=i%5===0;
    s+=`<line x1="${x}" y1="0" x2="${x}" y2="${major?14:8}" stroke="${major?'#4a5160':'#363c47'}" stroke-width="${major?1:.6}"/>`;
    if(major)s+=`<text x="${x}" y="31" text-anchor="middle" fill="#5a6170" font-family="IBM Plex Mono,monospace" font-size="6" letter-spacing=".04em">${labels[i/5]}</text>`;
  }
  return`<svg viewBox="0 0 200 36" preserveAspectRatio="none" style="display:block;width:100%;height:100%">${s}</svg>`;
})();

const DIAL_POS={bassa:4,media:50,alta:96};

function sceneCard(s){
  const noteH=s.note.length?`<div class="scol full"><h5>Note fuoco / tecnica</h5>${s.note.map(n=>`<div class="sli"><span class="d" style="color:var(--alta)">▸</span><span>${esc(n)}</span></div>`).join('')}</div>`:'';
  const gearH=s.gear.length?`<div class="scol"><h5>Gear</h5>${s.gear.map(n=>`<div class="sli"><span class="d">·</span><span>${esc(n)}</span></div>`).join('')}</div>`:'';
  const antH=s.anticipa.length?`<div class="scol"><h5>Anticipa</h5>${s.anticipa.map(n=>`<div class="sli"><span class="d" style="color:var(--media)">→</span><span>${esc(n)}</span></div>`).join('')}</div>`:'';
  return`<div class="scene-card" data-crit="${s.criticita}">
    <div class="dial">${DIALTICKS}<div class="dial-needle" style="left:4%"></div></div>
    <div class="sch">
      <div>
        <div class="sc-id">SC ${String(s.id).padStart(2,'0')}</div>
        <div class="sc-title">${esc(s.titolo)}</div>
        ${s.hdr&&s.hdr!=='Sequenza'?`<div class="sc-hdr">${esc(s.hdr)}</div>`:''}
      </div>

// Animazione ghiere diaframmi — chiamata dopo ogni render
const REDUCE=typeof matchMedia!=='undefined'&&matchMedia('(prefers-reduced-motion:reduce)').matches;
function playDials(){
  const cards=[...document.querySelectorAll('.scene-card')];
  if(!cards.length)return;
  cards.forEach(c=>{
    const n=c.querySelector('.dial-needle');if(!n)return;
    const crit=c.dataset.crit||'bassa';
    const target=DIAL_POS[crit]+'%';
    if(REDUCE){n.style.left=target;return;}
    n.style.transition='none';n.style.left='4%';
  });
  if(!REDUCE) requestAnimationFrame(()=>requestAnimationFrame(()=>{
    cards.forEach((c,i)=>{
      const n=c.querySelector('.dial-needle');if(!n)return;
      const crit=c.dataset.crit||'bassa';
      setTimeout(()=>{n.style.transition='left .9s cubic-bezier(.2,1,.32,1)';n.style.left=DIAL_POS[crit]+'%';},i*140);
    });
  }));
}

function verDocLine(ver){
  const parts=[];
  if(ver.docNames?.sceneggiatura)parts.push('Scen.');
  if(ver.docNames?.spoglio)parts.push('Spoglio');
  if(ver.docNames?.pdl)parts.push('PDL');
  return parts.length?parts.join(' · '):'documenti non registrati';
}
function versionHistoryHTML(){
  if(S.memVersions.length<1)return'';
  const rows=S.memVersions.map((ver,i)=>{
    const cur=ver.id===S.memCurrentId;
    const hasOlder=i<S.memVersions.length-1;
    return`<div class="ver-item${cur?' cur':''}">
      <div class="ver-num">v${ver.v}</div>
      <div class="ver-meta">
        <div class="vd">${new Date(ver.ts).toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'})} · ${new Date(ver.ts).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}</div>
        <div class="vf">${esc(verDocLine(ver))} · ${ver.scene_chiave?.length||0} scene chiave</div>
      </div>
      <div class="ver-acts">
        ${cur?`<span class="ver-cur-badge">Corrente</span>`:`<button class="mini" data-setcur="${ver.id}">Usa</button>`}
        ${hasOlder?`<button class="mini" data-compare="${ver.id}">Confronta</button>`:''}
        ${!cur?`<button class="mini danger" data-delver="${ver.id}">✕</button>`:''}
      </div>
    </div>`;
  }).join('');
  const open=!!S.collapse.cronologia;
  return`<div class="sec">
    <div class="sectit collapse-h" data-collapse="cronologia"><h2>Cronologia versioni</h2><span class="n">${S.memVersions.length} ${S.memVersions.length===1?'versione':'versioni'}</span><span class="collapse-arrow ${open?'open':''}">▾</span></div>
    <div id="body-cronologia" style="display:${open?'block':'none'}">
      ${rows}
      ${compareHTML()}
      <div class="hint" style="margin-top:4px">Ogni volta che premi <b>Analizza e memorizza</b> viene salvata una nuova versione. <b>Usa</b> rende corrente una versione (anche tornando indietro). <b>Confronta</b> mostra cosa è cambiato rispetto alla versione precedente. Le giornate in archivio ricordano con quale versione sono state analizzate.</div>
    </div>
  </div>`;
}
function diffLine(cls,sym,scn,txt){
  return`<div class="diff ${cls}"><span class="s">${sym}</span>${scn?`<span class="scn">Sc.${esc(scn)}</span>`:''}<span>${esc(txt)}</span></div>`;
}
function compareHTML(){
  if(!S.compare)return'';
  const a=S.memVersions.find(v=>v.id===S.compare.aId);
  const b=S.memVersions.find(v=>v.id===S.compare.bId);
  if(!a||!b)return'';
  const d=diffVersions(a,b);
  let groups='';
  // Scene
  let sc='';
  d.added.forEach(s=>sc+=diffLine('add','+',s.sc,`${s.desc} — ${s.nota} [${LABEL[NORM(s.crit)]}]`));
  d.removed.forEach(s=>sc+=diffLine('rem','−',s.sc,`${s.desc} — ${s.nota}`));
  d.changed.forEach(c=>{
    const cf=NORM(c.from.crit),ct=NORM(c.to.crit);
    let detail='';
    if(cf!==ct)detail+=`<div class="crit-arrow">${badge(cf)} <span style="color:var(--mu2)">→</span> ${badge(ct)}</div>`;
    if(c.from.nota!==c.to.nota)detail+=`<div style="font-size:12.5px;color:var(--mu);margin-top:3px">nota: ${esc(c.to.nota)}</div>`;
    if(c.from.desc!==c.to.desc)detail+=`<div style="font-size:12.5px;color:var(--mu);margin-top:3px">${esc(c.to.desc)}</div>`;
    sc+=`<div class="diff chg"><span class="s">~</span><span class="scn">Sc.${esc(c.sc)}</span><span>${detail}</span></div>`;
  });
  if(!sc)sc=`<div class="cmp-none">Nessuna scena chiave aggiunta, rimossa o modificata.</div>`;
  groups+=`<div class="cmp-grp"><h4>Scene chiave</h4>${sc}</div>`;
  // Rischi
  let ri='';
  d.rAdd.forEach(r=>ri+=diffLine('add','+','',r));
  d.rRem.forEach(r=>ri+=diffLine('rem','−','',r));
  if(!ri)ri=`<div class="cmp-none">Rischi tecnici invariati.</div>`;
  groups+=`<div class="cmp-grp"><h4>Rischi produzione</h4>${ri}</div>`;
  // Briefing / PDL
  let tx='';
  if(d.briefingChanged)tx+=`<div class="diff chg" style="margin-bottom:10px"><span class="s">~</span><span><b style="font-family:var(--mono);font-size:11px">BRIEFING aggiornato:</b><div style="margin-top:5px;color:#d0cfca;line-height:1.55">${esc(b.briefing)}</div></span></div>`;
  if(d.pdlChanged)tx+=`<div class="diff chg"><span class="s">~</span><span><b style="font-family:var(--mono);font-size:11px">PDL aggiornato:</b><div style="margin-top:5px;color:#d0cfca;line-height:1.55">${esc(b.pdl_summary)}</div></span></div>`;
  if(!tx)tx=`<div class="cmp-none">Briefing e sintesi PDL invariati.</div>`;
  groups+=`<div class="cmp-grp"><h4>Briefing &amp; PDL</h4>${tx}</div>`;
  // AI explain block
  let aiBlock='';
  if(S.diffAI.loading)aiBlock=`<div class="diff-ai"><div class="row" style="gap:11px"><div class="spin sm"></div><span style="font-family:var(--mono);font-size:12px;color:var(--mu)">Sto leggendo le differenze…</span></div></div>`;
  else if(S.diffAI.text)aiBlock=`<div class="diff-ai"><div class="mlbl" style="font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--mu);margin-bottom:9px">Cosa cambia per il fuoco</div><div class="ai-txt">${esc(S.diffAI.text)}</div></div>`;
  else if(S.diffAI.error)aiBlock=`<div class="diff-ai"><div class="err" style="margin:0">${esc(S.diffAI.error)}</div></div>`;
  else aiBlock=`<div class="diff-ai"><button id="btn-diffai" class="btn ghost sm">${S.mode==='manual'?"Spiega le differenze (via claude.ai)":"Spiega le differenze con l'AI"}</button></div>`;
  return`<div class="cmp">
    <div class="cmp-head">
      <div><b>Confronto v${a.v} → v${b.v}</b><small>${new Date(a.ts).toLocaleDateString('it-IT')} vs ${new Date(b.ts).toLocaleDateString('it-IT')}</small></div>
      <button class="mini" id="btn-closecmp">Chiudi ✕</button>
    </div>
    <div class="cmp-body">${groups}</div>
    ${aiBlock}
  </div>`;
}

    h+=`<div class="sec">
      <div class="sectit collapse-h" data-collapse="riassunto"><h2>Riassunto sceneggiatura</h2>${S.riassunto?`<span class="n">aggiornato ${new Date(S.riassunto.ts).toLocaleDateString('it-IT')}</span>`:''}<span class="collapse-arrow ${open?'open':''}">▾</span></div>
      <div id="body-riassunto" style="display:${open?'block':'none'}">
        <div class="card" style="padding:18px">
          ${S.riassuntoLoading
            ?`<div class="row" style="gap:12px;padding:8px 0"><div class="spin sm"></div><span style="font-family:var(--mono);font-size:12px;color:var(--mu)">Generazione riassunto…</span></div>`
            :S.riassunto
              ?riassuntoBodyHTML(S.riassunto)
              :`<div class="hint" style="margin-bottom:14px">Genera un riassunto della sceneggiatura: utile per chi deve prepararsi alla produzione senza leggere tutto il copione.</div>
                <button id="btn-riassunto" class="btn">${S.mode==='manual'?'Prepara prompt →':'Genera riassunto'}</button>`
          }
          ${S.riassuntoError?`<div class="err">${esc(S.riassuntoError)}</div>`:''}
        </div>
      </div>
    </div>`;
  }

  // Memoria preview
  if(m&&!S.memLoading){
    const open=!!S.collapse.briefing;
    h+=`<div class="sec no-print">
      <div class="sectit collapse-h" data-collapse="briefing"><h2>Briefing reparto macchina</h2><span class="n">memoria v${m.v} corrente</span><span class="collapse-arrow ${open?'open':''}">▾</span></div>
      <div id="body-briefing" style="display:${open?'block':'none'}">
        <div class="card">
          <div class="mem-box">
            <div class="mem-text">${esc(m.briefing)}</div>
          </div>
          ${m.rischi?.length?`<div style="padding:0 18px 18px;border-top:1px solid var(--b);padding-top:16px;margin-top:0">
            <div class="mlbl">Rischi tecnici produzione</div>
            ${m.rischi.map(r=>`<div class="sli"><span class="d" style="color:var(--red)">▸</span><span>${esc(r)}</span></div>`).join('')}
          </div>`:''}
          ${m.scene_chiave?.length?`<div style="padding:0 18px 18px;border-top:1px solid var(--b);padding-top:16px">
            <div class="mlbl">Scene chiave mappate</div>
            ${m.scene_chiave.map(s=>`<div class="sli"><span class="d" style="color:var(--mu2);width:30px">Sc.${esc(s.sc)}</span><span style="display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap">${badge(NORM(s.crit))} <span>${esc(s.desc)}</span><span style="color:var(--mu2)">—</span><span>${esc(s.nota)}</span></span></div>`).join('')}
          </div>`:''}
        </div>
      </div>
    </div>`;
  }

  // Cronologia versioni
  if(!S.memLoading) h+=`<div class="no-print">${versionHistoryHTML()}</div>`;

  // Attrezzatura
  {
    const open=!!S.collapse.attrezzatura;
    h+=`<div class="sec no-print">
      <div class="sectit collapse-h" data-collapse="attrezzatura"><h2>Attrezzatura (Opzionale) </h2><span class="collapse-arrow ${open?'open':''}">▾</span></div>
      <div id="body-attrezzatura" style="display:${open?'block':'none'}">
        <div class="card" style="padding:18px">
          <div class="field"><label class="lbl">Titolo produzione</label><input id="prof-nome" class="inp" type="text" value="${esc(S.profile.nome)}" placeholder="Es. Nobody's Diary"></div>
          <div class="field"><label class="lbl">Mezzi / attrezzatura a disposizione</label><textarea id="prof-gear" class="inp" rows="4" placeholder="Camera, ottiche, follow focus wireless, monitor, transmitter, batterie…&#10;Es. ARRI Alexa 35, Cooke S4, Hi-5 wireless, Swit K15 + Teradek Bolt 4K, Blueshape…">${esc(S.profile.gear)}</textarea></div>
          <div class="field"><label class="lbl">Note produzione</label><textarea id="prof-note" class="inp" rows="3" placeholder="Location ricorrenti, particolarità, accordi tecnici, vincoli…">${esc(S.profile.note)}</textarea></div>
          <div class="row">
            <button id="btn-sprof" class="btn">Salva</button>
            <span id="prof-ok" class="saved" style="display:none"><span class="dot" style="background:var(--acc)"></span>Salvato</span>
          </div>
        </div>
      </div>
    </div>`;
  }

  h+='</div>';
  document.getElementById('main').innerHTML=h;

  // Collapsible toggles
  document.querySelectorAll('[data-collapse]').forEach(el=>{
    el.addEventListener('click',()=>toggleCollapse(el.dataset.collapse));
  });

  // Riassunto
  document.getElementById('btn-riassunto')?.addEventListener('click',()=>{S.collapse.riassunto=true;lsSet('ac.collapse',S.collapse);runRiassunto();});
  document.getElementById('btn-riassunto-rigenera')?.addEventListener('click',()=>{S.riassunto=null;lsSet('ac.riassunto',null);runRiassunto();});
  document.getElementById('btn-print-riassunto')?.addEventListener('click',()=>window.print());

  // Tipo produzione buttons
  document.getElementById('btn-type-film')?.addEventListener('click',()=>{
    S.profile.type='film';
    lsSet('ac.profile',S.profile);
    render();
  });
  document.getElementById('btn-type-serie')?.addEventListener('click',()=>{
    S.profile.type='serie';
    lsSet('ac.profile',S.profile);
    render();
  });

  // Doc listeners
  ['sceneggiatura','spoglio','pdl','listamateriale'].forEach(key=>{
    document.getElementById('f-'+key)?.addEventListener('change',async e=>{
      const f=e.target.files[0];if(!f)return;
      document.getElementById('fn-'+key).innerHTML='<span style="font-family:var(--mono);font-size:11px;color:var(--mu2)">Estrazione…</span>';
      try{
        const t=await extractText(f);
        S.docs[key]={nome:f.name,testo:t,ts:Date.now()};
        lsSet('ac.docs',S.docs);render();
      }catch{
        document.getElementById('fn-'+key).innerHTML='<span style="font-family:var(--mono);font-size:11px;color:var(--red)">✗ Errore lettura PDF</span>';
      }
    });
    document.getElementById('del-'+key)?.addEventListener('click',()=>{
      S.docs[key]=null;
      lsSet('ac.docs',S.docs);
      render();
    });
  });

  // Multiple sceneggiature (serie)
  document.getElementById('f-sceneggiature-add')?.addEventListener('change',async e=>{
    const f=e.target.files[0];if(!f)return;
    try{
      const t=await extractText(f);
      if(!S.docs.sceneggiature)S.docs.sceneggiature=[];
      S.docs.sceneggiature.push({nome:f.name,testo:t,ts:Date.now()});
      lsSet('ac.docs',S.docs);
      render();
    }catch{
      alert('Errore nella lettura del PDF');
    }
  });
  [...document.querySelectorAll('[id^="del-sceneggiature-"]')].forEach(btn=>{
    const idx=parseInt(btn.id.split('-')[2]);
    btn.addEventListener('click',()=>{
      if(S.docs.sceneggiature){
        S.docs.sceneggiature.splice(idx,1);
        lsSet('ac.docs',S.docs);
        render();
      }
    });
  });

  document.getElementById('btn-memdocs')?.addEventListener('click',runDocs);
  document.querySelectorAll('[data-compare]').forEach(b=>b.addEventListener('click',()=>openCompare(b.dataset.compare)));
  document.querySelectorAll('[data-setcur]').forEach(b=>b.addEventListener('click',()=>setCurrentVersion(b.dataset.setcur)));
  document.querySelectorAll('[data-delver]').forEach(b=>b.addEventListener('click',()=>deleteVersion(b.dataset.delver)));
  document.getElementById('btn-closecmp')?.addEventListener('click',()=>{S.compare=null;render();});
  document.getElementById('btn-diffai')?.addEventListener('click',runDiff);
  document.getElementById('btn-sprof')?.addEventListener('click',()=>{
    S.profile.nome=document.getElementById('prof-nome').value;
    S.profile.gear=document.getElementById('prof-gear').value;
    S.profile.note=document.getElementById('prof-note').value;
    lsSet('ac.profile',S.profile);
    const el=document.getElementById('prof-ok');el.style.display='inline-flex';
    setTimeout(()=>{el.style.display='none';},2000);
  });
  document.getElementById('btn-skey')?.addEventListener('click',()=>{
    S.apiKey=document.getElementById('inp-key').value.trim();
    localStorage.setItem('ac.key',S.apiKey);notifyChange();
    const el=document.getElementById('key-ok');el.style.display='inline-flex';
    setTimeout(()=>{el.style.display='none';render();},1500);
  });
}

function renderImpostazioni(){
  let h=`<div class="shell">`;

  if(sb){
    const syncLabel=S.syncStatus==='syncing'?'Sincronizzazione…':
      S.syncStatus==='error'?'Errore di sincronizzazione':
      S.lastSyncAt?'Sincronizzato alle '+S.lastSyncAt.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}):
      'In attesa di sincronizzazione';
    h+=`<div class="sec">
      <div class="sectit"><h2>Account</h2></div>
      <div class="card" style="padding:18px">
        <div class="row">
          <span style="font-size:13px;color:var(--tx2)">${S.user?esc(S.user.email):'—'}</span>
          <span class="spacer"></span>
          <button id="btn-logout" class="btn ghost sm">Esci</button>
        </div>
        <div class="hint" style="margin-top:10px">I tuoi dati (API key, profilo, archivio, statistiche) sono sincronizzati su questo account: accedi con le stesse credenziali su qualsiasi dispositivo per ritrovarli.</div>
        <div class="row" style="margin-top:12px">
          <span style="font-size:11.5px;color:${S.syncStatus==='error'?'var(--err,#e05)':'var(--mu)'}">${esc(syncLabel)}</span>
          <span class="spacer"></span>
          <button id="btn-syncnow" class="btn ghost sm">Sincronizza ora</button>
        </div>
        ${S.syncStatus==='error'?`<div class="hint" style="margin-top:6px;color:var(--err,#e05)">${esc(S.syncError||'')}</div>`:''}
      </div>
    </div>`;
  }

  // Usage section
  const dailyUsage=Object.entries(S.usage.daily).sort(([a],[b])=>b.localeCompare(a)).slice(0,30);
  const totalCost=Object.values(S.usage.daily).reduce((s,d)=>s+d.cost,0);

  h+=`<div class="sec">
    <div class="sectit"><h2>Utilizzo API</h2></div>
    <div class="card" style="padding:18px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
        <div>
          <div style="font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--mu);margin-bottom:8px">Sessione in corso</div>
          <div style="font-size:24px;font-weight:700;font-family:var(--disp);color:var(--acc);line-height:1">${formatCost(S.usage.session.cost)}</div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--mu2);margin-top:4px">${S.usage.session.inputTokens+S.usage.session.outputTokens} token</div>
        </div>
        <div>
          <div style="font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--mu);margin-bottom:8px">Totale (ultimi 30 giorni)</div>
          <div style="font-size:24px;font-weight:700;font-family:var(--disp);color:var(--tx);line-height:1">${formatCost(totalCost)}</div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--mu2);margin-top:4px">${dailyUsage.length} giornate</div>
        </div>
      </div>

      ${dailyUsage.length>0?`<div style="border-top:1px solid var(--b);padding-top:16px;margin-top:16px">
        <div style="font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--mu);margin-bottom:10px">Ultime analisi</div>
        <div style="display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto">
          ${dailyUsage.map(([d,usage])=>`
            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--bg2);border-radius:8px;font-size:12px">
              <span style="color:var(--mu2)">${fmtDate(d)}</span>
              <div style="display:flex;gap:14px;align-items:center">
                <span style="color:var(--tx2);font-family:var(--mono);font-size:11px">${usage.tokens} token</span>
                <span style="color:var(--acc);font-weight:600;min-width:50px;text-align:right">${formatCost(usage.cost)}</span>
              </div>
            </div>
          `).join('')}
        </div>
      </div>`:''}

      <div class="row" style="margin-top:16px">
        <button id="btn-reset-usage" class="btn ghost sm">Azzera statistiche</button>
        <a href="https://console.anthropic.com/settings/billing" target="_blank" rel="noopener" class="btn ghost sm" style="text-decoration:none">Controlla Saldo</a>
      </div>
      <div class="hint" style="margin-top:10px">I numeri qui sopra sono una <b>stima locale</b> basata sui token consumati, non il saldo effettivo del tuo account. Per il credito reale rimasto, controlla il pannello Billing di Anthropic.</div>
    </div>
  </div>`;

  h+=`<div class="sec">
    <div class="sectit"><h2>API Key</h2></div>
    <div class="card" style="padding:18px">
      ${S.mode==='manual'?`<div class="vbanner" style="margin:0 0 16px">Sei in <b>modalità Manuale</b>: non ti serve nessuna API key. Compila questo campo solo se passi alla modalità <b>⚡ API</b> per l'analisi automatica.</div>`:''}
      <div class="field">
        <label class="lbl">Anthropic API Key</label>
        <input id="inp-key" class="inp mono" type="password" value="${esc(S.apiKey)}" placeholder="sk-ant-api03-…">
        <div class="hint">Ottieni la key su <b>console.anthropic.com</b> → API Keys. Salvata solo in questo browser (localStorage), non trasmessa a terze parti.</div>
      </div>
      <div class="row">
        <button id="btn-skey" class="btn ghost sm">Salva API key</button>
        <span id="key-ok" class="saved" style="display:none"><span class="dot" style="background:var(--acc)"></span>Salvata</span>
        ${S.apiKey?`<span class="ok">● Attiva</span>`:''}
      </div>
    </div>
    <div class="mode-note" style="margin-top:14px">${S.mode==='manual'
      ?`<b style="color:var(--acc)">Manuale · gratis</b> — i pulsanti preparano un prompt da incollare in claude.ai.`
      :`<b style="color:var(--amb)">Claude API</b> — elaborazione automatica, richiede la API key qui sotto.`}</div>
    <div class="ft">Tutti i dati (memoria, archivio, profilo, statistiche) restano sul tuo browser in localStorage. In modalità API i testi vengono inviati ad Anthropic su HTTPS solo quando premi Analizza. Il tracking dei token è trasparente — serve solo a monitorare i costi.</div>
  </div>`;

  h+='</div>';
  document.getElementById('main').innerHTML=h;

  document.getElementById('btn-skey')?.addEventListener('click',()=>{
    S.apiKey=document.getElementById('inp-key').value.trim();
    localStorage.setItem('ac.key',S.apiKey);notifyChange();
    const el=document.getElementById('key-ok');el.style.display='inline-flex';
    setTimeout(()=>{el.style.display='none';render();},1500);
  });

  document.getElementById('btn-reset-usage')?.addEventListener('click',()=>{
    if(confirm('Azzera le statistiche di utilizzo API?')){
      S.usage={session:{inputTokens:0,outputTokens:0,cost:0},daily:{}};
      lsSet('ac.usage',S.usage);
      render();
    }
  });

  document.getElementById('btn-logout')?.addEventListener('click',()=>{
    if(confirm('Uscire dall\'account? Potrai accedere di nuovo con le stesse credenziali su qualsiasi dispositivo.'))logout();
  });

  document.getElementById('btn-syncnow')?.addEventListener('click',async()=>{
    flushPush();
    await pullFromCloud();
    render();
  });
}

function renderArchivio(){
  let h=`<div class="shell"><div class="sec">
    <div class="sectit"><h2>Archivio</h2><span class="n">${S.index.length} ${S.index.length===1?'giornata':'giornate'} salvate</span></div>`;
  if(!S.index.length){
    h+=`<div class="card" style="padding:44px 24px;text-align:center;color:var(--mu2)"><div style="font-size:13px;line-height:1.7;max-width:380px;margin:0 auto">Nessuna giornata salvata.<br>Analizza una giornata in <b style="color:var(--mu)">Oggi</b> e premi <b style="color:var(--mu)">Salva in archivio</b>:<br>la memoria viene usata per correlazioni nelle analisi successive.</div></div>`;
  }else{
    h+=S.index.map(d=>{
      const col=d.crit==='alta'?'var(--red)':d.crit==='media'?'var(--amb)':'var(--bassa)';
      return`<button class="arc-btn" data-d="${esc(d.data)}">
        <span class="dot" style="background:${col}"></span>
        <span class="arc-info"><b>${fmtDate(d.data)}</b><span>${d.nome?esc(d.nome)+' · ':''}${esc(d.titoli||'—')}</span></span>
        ${d.memV?`<span class="arc-count" style="color:${d.memV===S.memoria?.v?'var(--acc)':'var(--mu2)'}">mem v${d.memV}</span>`:''}
        <span class="arc-count">${String(d.scene_count).padStart(2,'0')} SC</span>
      </button>`;
    }).join('');
  }
  h+=`<div class="ft">Le giornate archiviate vengono incluse come contesto nelle analisi successive, così l'agente può fare correlazioni tra scene e giornate della stessa produzione.</div>
  </div></div>`;
  document.getElementById('main').innerHTML=h;
  document.querySelectorAll('.arc-btn').forEach(b=>b.addEventListener('click',()=>loadDay(b.dataset.d)));
}

// ═══════════════════════════ RENDER ═══════════════════════════════════
function render(){
  renderTopbar();
  ({oggi:renderOggi,produzione:renderProduzione,archivio:renderArchivio,impostazioni:renderImpostazioni}[S.view]||renderOggi)();
  renderBridge();
  requestAnimationFrame(playDials);
}

render();
initAuth();

// Service Worker registration per aggiornamenti automatici
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(reg=>{
    console.log('Service Worker registrato');
  }).catch(err=>{
    console.log('Service Worker registration fallito:', err);
  });
}
</script>
</body>
</html>
